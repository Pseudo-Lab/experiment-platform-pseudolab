name: gitops-ci

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/gitops-ci.yml'
      - 'frontend/**'
      - 'backend/**'
      - 'docker-compose.yml'
      - 'docker-compose.dev.yml'
  workflow_dispatch:

concurrency:
  group: gitops-ci-${{ github.ref }}
  cancel-in-progress: true

env:
  FRONTEND_IMAGE: ghcr.io/pseudo-lab/experiment-platform-pseudolab-frontend
  BACKEND_IMAGE: ghcr.io/pseudo-lab/experiment-platform-pseudolab-backend
  IMAGE_PLATFORMS: linux/amd64,linux/arm64
  OPS_REPO: pseudo-lab/DevFactory-Ops
  OPS_KUSTOMIZATION_FILE: services/experiment-platform-pseudolab/overlays/prod/kustomization.yaml
  IMAGE_TAG: ${{ github.sha }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout application repository
        uses: actions/checkout@v5

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          platforms: ${{ env.IMAGE_PLATFORMS }}
          tags: |
            ${{ env.FRONTEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.FRONTEND_IMAGE }}:latest

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          platforms: ${{ env.IMAGE_PLATFORMS }}
          tags: |
            ${{ env.BACKEND_IMAGE }}:${{ env.IMAGE_TAG }}
            ${{ env.BACKEND_IMAGE }}:latest

  update-ops-repo:
    needs: build-and-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout DevFactory-Ops repository
        uses: actions/checkout@v5
        with:
          repository: ${{ env.OPS_REPO }}
          token: ${{ secrets.OPS_REPO_TOKEN }}
          path: devfactory-ops
          fetch-depth: 0

      - name: Update image tags in production kustomization
        uses: mikefarah/yq@v4.44.5
        with:
          cmd: |
            yq -i '(.images[] | select(.name == "${{ env.FRONTEND_IMAGE }}").newTag) = "${{ env.IMAGE_TAG }}"' devfactory-ops/${{ env.OPS_KUSTOMIZATION_FILE }}
            yq -i '(.images[] | select(.name == "${{ env.BACKEND_IMAGE }}").newTag) = "${{ env.IMAGE_TAG }}"' devfactory-ops/${{ env.OPS_KUSTOMIZATION_FILE }}

      - name: Verify production image tags were updated
        uses: mikefarah/yq@v4.44.5
        with:
          cmd: |
            FRONTEND_TAG=$(yq -r '.images[] | select(.name == "${{ env.FRONTEND_IMAGE }}") | .newTag // ""' devfactory-ops/${{ env.OPS_KUSTOMIZATION_FILE }})
            BACKEND_TAG=$(yq -r '.images[] | select(.name == "${{ env.BACKEND_IMAGE }}") | .newTag // ""' devfactory-ops/${{ env.OPS_KUSTOMIZATION_FILE }})

            if [ -z "$FRONTEND_TAG" ] || [ "$FRONTEND_TAG" != "${{ env.IMAGE_TAG }}" ]; then
              echo "Frontend image entry missing or newTag mismatch. Expected ${{ env.IMAGE_TAG }}, got '$FRONTEND_TAG'"
              exit 1
            fi

            if [ -z "$BACKEND_TAG" ] || [ "$BACKEND_TAG" != "${{ env.IMAGE_TAG }}" ]; then
              echo "Backend image entry missing or newTag mismatch. Expected ${{ env.IMAGE_TAG }}, got '$BACKEND_TAG'"
              exit 1
            fi

      - name: Configure git for DevFactory-Ops update
        run: |
          git config user.name "experiment-platform-pseudolab-ci[bot]"
          git config user.email "experiment-platform-pseudolab-ci[bot]@users.noreply.github.com"
        working-directory: devfactory-ops

      - name: Commit and push kustomization update to DevFactory-Ops main
        run: |
          git add "${{ env.OPS_KUSTOMIZATION_FILE }}"

          if git diff --cached --quiet; then
            echo "No image tag changes detected; skipping commit and push."
            exit 0
          fi

          git commit -m "chore(experiment-platform-pseudolab): bump frontend/backend image tags to ${{ env.IMAGE_TAG }}"
          git push origin HEAD:main
        working-directory: devfactory-ops
